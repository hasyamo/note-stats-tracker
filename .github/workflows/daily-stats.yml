name: Note Stats Collection

# 2026-07-12 廃止: データはD1（CF/note-data-collector）へ移行済み。
# 自動収集（cronトリガー）は停止。手動実行のみ残す（緊急時の参照用）。
on:
  workflow_dispatch: # 手動実行用

permissions:
  contents: write

jobs:
  fetch-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch note stats
        env:
          NOTE_COOKIE: ${{ secrets.NOTE_COOKIE }}
          NOTE_USERNAME: ${{ secrets.NOTE_USERNAME }}
          COOKIE_SET_DATE: ${{ vars.COOKIE_SET_DATE }}
        run: python scripts/fetch_stats.py

      - name: Fetch likes data
        continue-on-error: true
        run: python scripts/fetch_likes.py

      - name: Fetch my likes data
        continue-on-error: true
        env:
          NOTE_COOKIE: ${{ secrets.NOTE_COOKIE }}
          NOTE_USERNAME: ${{ secrets.NOTE_USERNAME }}
        run: python scripts/fetch_my_likes.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || (git commit -m "📊 $(TZ=Asia/Tokyo date +%Y-%m-%d) stats" && git push)
