name: Note Stats Collection

on:
  schedule:
    # 朝 7:00 JST = 22:00 UTC前日（likes + my_likesのみ。スキ活の材料）
    - cron: '0 22 * * *'
    # 昼 16:30 JST = 7:30 UTC（note 16:00更新後。6h判定）
    - cron: '30 7 * * *'
    # 夜 22:30 JST = 13:30 UTC（メイン集計）
    - cron: '30 13 * * *'
  workflow_dispatch: # 手動実行用

permissions:
  contents: write

jobs:
  fetch-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 朝(22:00 UTC)はlikes系のみ、昼・夜はstatsも取得
      - name: Fetch note stats
        if: github.event.schedule != '0 22 * * *'
        env:
          NOTE_COOKIE: ${{ secrets.NOTE_COOKIE }}
          NOTE_USERNAME: ${{ secrets.NOTE_USERNAME }}
          COOKIE_SET_DATE: ${{ vars.COOKIE_SET_DATE }}
        run: python scripts/fetch_stats.py

      - name: Fetch likes data
        continue-on-error: true
        run: python scripts/fetch_likes.py

      - name: Fetch my likes data
        continue-on-error: true
        env:
          NOTE_COOKIE: ${{ secrets.NOTE_COOKIE }}
          NOTE_USERNAME: ${{ secrets.NOTE_USERNAME }}
        run: python scripts/fetch_my_likes.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || (git commit -m "📊 $(TZ=Asia/Tokyo date +%Y-%m-%d) stats" && git push)
