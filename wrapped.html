<style>

@keyframes fadeInSlow{from{opacity:0}to{opacity:1}}

.fu{animation:fadeUp .7s cubic-bezier(.22,1,.36,1) both}

:root{

body{

}

.ticker-wrap{

.ticker-inner{

.badge{

}

.sec{padding:80px 32px;}

.dc::first-letter{

}
.dc-light::first-letter{

  font-weight:900;

}

/* Navigator - character + speech bubble */

}
.navi-img{

.growth-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center;}

.chibi-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:12px;margin-top:32px;}

function noteURL(key) { return 'https://note.com/hasyamo/n/' + key; }

function getGirlLine(section) {
  return GIRL_LINES[section][TODAY_IDX];
}

// Navigator component HTML
function navi(section, dark) {
  const cls = dark ? 'navi-bubble navi-bubble-dark' : 'navi-bubble';
  return `
    <div class="navi">
      <img class="navi-img" src="images/eyes/eyes-${TODAY_FILE}.webp" alt="${TODAY_NAME}">
      <div class="${cls}">
        <div class="navi-name">${TODAY_NAME}</div>
        ${getGirlLine(section)}
      </div>
    </div>`;
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line => {
    const vals = []; let cur = '', inQ = false;
    for (const ch of line) {
      if (ch === '"') { inQ = !inQ; continue; }
      if (ch === ',' && !inQ) { vals.push(cur.trim()); cur = ''; } else cur += ch;
    }
    vals.push(cur.trim());
    return Object.fromEntries(headers.map((h, i) => [h, vals[i] ?? '']));
  });
}

async function loadData() {
  const base = 'data/';
  const [summaryRaw, articlesRaw, categoriesRaw, likesRaw] = await Promise.all([
    fetch(base + 'daily_summary.csv').then(r => r.text()),
    fetch(base + 'articles.csv').then(r => r.text()),
    fetch(base + 'article_categories.csv').then(r => r.text()),
    fetch(base + 'likes.csv').then(r => r.text()),
  ]);
  return compute(parseCSV(summaryRaw), parseCSV(articlesRaw), parseCSV(categoriesRaw), parseCSV(likesRaw));
}

function int(v) { return parseInt(v) || 0; }

function compute(summary, articles, categories, likes) {
  const latest = summary[summary.length - 1];
  const prev = summary[summary.length - 2] || {};
  const first = summary[0];

  const totalPV = int(latest.total_pv);
  const totalLike = int(latest.total_like);
  const totalArt = int(latest.article_count);
  const follower = int(latest.follower_count);
  const prevPV = int(prev.total_pv);
  const prevLike = int(prev.total_like);
  const prevArt = int(prev.article_count);
  const prevFollower = int(prev.follower_count);
  const firstPV = int(first.total_pv);
  const firstLike = int(first.total_like);

  const pvGrowth = firstPV > 0 ? Math.round((totalPV - firstPV) / firstPV * 100) : 0;
  const likeGrowth = firstLike > 0 ? Math.round((totalLike - firstLike) / firstLike * 100) : 0;
  const eta = totalPV > 0 ? (totalLike / totalPV * 100).toFixed(2) : '0';

  const latestDate = articles.reduce((a, b) => a.date > b.date ? a : b).date;
  const latestArticles = articles.filter(r => r.date === latestDate);

  const catMap = {};
  categories.forEach(c => { catMap[c.key] = c; });

  const catCounts = {};
  CAT_ORDER.forEach(c => catCounts[c] = 0);
  categories.forEach(c => { if (catCounts[c.category] !== undefined) catCounts[c.category]++; });

  const catEtas = {};
  CAT_ORDER.forEach(c => catEtas[c] = []);
  latestArticles.forEach(a => {
    const cat = catMap[a.key];
    if (cat && int(a.read_count) > 0) {
      catEtas[cat.category].push(int(a.like_count) / int(a.read_count));
    }
  });
  const catEtaAvg = {};
  CAT_ORDER.forEach(c => {
    const arr = catEtas[c];
    catEtaAvg[c] = arr.length > 0 ? arr.reduce((a, b) => a + b, 0) / arr.length : 0;
  });

  const top5PV = latestArticles.filter(r => int(r.read_count) > 0)
    .sort((a, b) => int(b.read_count) - int(a.read_count)).slice(0, 5)
    .map((r, i) => ({ rank: String(i+1).padStart(2,'0'), title: r.title.replace(/\|.*$/,'').slice(0,36), pv: int(r.read_count), cat: catMap[r.key]?.category || '?', key: r.key }));

  const top5Like = latestArticles.filter(r => int(r.like_count) > 0)
    .sort((a, b) => int(b.like_count) - int(a.like_count)).slice(0, 5)
    .map((r, i) => ({ rank: String(i+1).padStart(2,'0'), title: r.title.replace(/\|.*$/,'').slice(0,36), likes: int(r.like_count), cat: catMap[r.key]?.category || '?', key: r.key }));

  const top5Eta = latestArticles.filter(r => int(r.read_count) >= 30)
    .map(r => ({...r, eta: int(r.like_count) / int(r.read_count)}))
    .sort((a, b) => b.eta - a.eta).slice(0, 5)
    .map((r, i) => ({ rank: String(i+1).padStart(2,'0'), title: r.title.replace(/\|.*$/,'').slice(0,36), eta: (r.eta*100).toFixed(1), cat: catMap[r.key]?.category || '?', key: r.key }));

  const worst3 = latestArticles.filter(r => int(r.read_count) > 0)
    .sort((a, b) => int(a.read_count) - int(b.read_count)).slice(0, 3)
    .map((r, i) => ({ title: r.title.replace(/\|.*$/,'').slice(0,28), pv: int(r.read_count), cat: catMap[r.key]?.category || '?', key: r.key }));

  const fanCounts = {}, fanNames = {};
  likes.forEach(l => { const uid = l.like_user_id; if (!uid) return; fanCounts[uid] = (fanCounts[uid]||0)+1; fanNames[uid] = l.like_username; });
  const topFans = Object.entries(fanCounts).sort((a,b) => b[1]-a[1]).slice(0,7)
    .map(([uid, count], i) => ({ rank: i+1, name: fanNames[uid]||'unknown', count }));

  const step = Math.max(1, Math.floor(summary.length / 16));
  const growthChart = summary.filter((_,i) => i%step===0 || i===summary.length-1)
    .map(r => ({ d: (r.date||'').replace('2026-','').replace('2025-',''), pv: int(r.total_pv), like: int(r.total_like), follower: int(r.follower_count) }));

  // Journey milestones
  const journeyArticles = categories
    .filter(c => c.article_number && !['pre','intro','special'].includes(c.article_number))
    .sort((a, b) => int(a.article_number) - int(b.article_number));
  const journeyCount = journeyArticles.length;
  const firstArticleDate = journeyArticles.length > 0 ? journeyArticles[0].published_date : '';
  const lastArticleDate = journeyArticles.length > 0 ? journeyArticles[journeyArticles.length - 1].published_date : '';
  const daysSinceStart = firstArticleDate && lastArticleDate
    ? Math.floor((new Date(lastArticleDate) - new Date(firstArticleDate)) / 86400000) : 0;

  // Build milestone events
  const milestones = [];
  if (journeyArticles.length > 0) milestones.push({ num: 1, title: journeyArticles[0].title.slice(0,30), date: journeyArticles[0].published_date, label: 'First Note' });
  [10,20,30,50,70].forEach(n => {
    const a = journeyArticles.find(c => int(c.article_number) === n);
    if (a) milestones.push({ num: n, title: a.title.slice(0,30), date: a.published_date, label: `#${n}` });
  });
  if (journeyArticles.length > 1) {
    const last = journeyArticles[journeyArticles.length - 1];
    milestones.push({ num: int(last.article_number), title: last.title.slice(0,30), date: last.published_date, label: 'Latest' });
  }

  // 7-day trend
  const allDates = [...new Set(articles.map(a => a.date))].sort();
  const recent7 = allDates.slice(-7);
  let rising = 0, cont = 0, slow = 0, stop = 0;
  if (recent7.length >= 2) {
    const oldSnap = {}, newSnap = {};
    articles.forEach(a => {
      if (a.date === recent7[0]) oldSnap[a.key] = int(a.read_count);
      if (a.date === recent7[recent7.length-1]) newSnap[a.key] = int(a.read_count);
    });
    Object.keys(newSnap).forEach(key => {
      const diff = newSnap[key] - (oldSnap[key]||0);
      if (diff >= 20) rising++; else if (diff >= 5) cont++; else if (diff >= 1) slow++; else stop++;
    });
  }

  // リライト候補: 減速中だがη高い記事
  const rewriteCandidates = (() => {
    if (recent7.length < 2) return [];
    const oldSnap2 = {}, newSnap2 = {};
    articles.forEach(a => {
      if (a.date === recent7[0]) oldSnap2[a.key] = int(a.read_count);
      if (a.date === recent7[recent7.length-1]) newSnap2[a.key] = int(a.read_count);
    });
    return latestArticles
      .filter(r => {
        const diff = (newSnap2[r.key]||0) - (oldSnap2[r.key]||0);
        return diff >= 0 && diff <= 4 && int(r.read_count) >= 30;
      })
      .map(r => ({ ...r, eta: int(r.like_count) / int(r.read_count) }))
      .sort((a, b) => b.eta - a.eta)
      .slice(0, 3)
      .map(r => ({ title: r.title.replace(/\|.*$/,'').slice(0,36), pv: int(r.read_count), eta: (r.eta*100).toFixed(1), cat: catMap[r.key]?.category || '?', key: r.key }));
  })();

  // 直近10本のカテゴリ偏り
  const recent10cats = journeyArticles.slice(-10).map(c => c.category);
  const recent10catCounts = {};
  recent10cats.forEach(c => { recent10catCounts[c] = (recent10catCounts[c]||0)+1; });
  const mostWrittenCat = Object.entries(recent10catCounts).sort((a,b) => b[1]-a[1])[0];
  const leastWrittenCats = CAT_ORDER.filter(c => c !== 'F' && c !== 'G' && !recent10catCounts[c]);
  const highEtaCat = CAT_ORDER.filter(c => catEtaAvg[c] > 0).sort((a,b) => catEtaAvg[b] - catEtaAvg[a])[0];

  const tickerText = `PV ${totalPV.toLocaleString()} / Like ${totalLike.toLocaleString()} / eta ${eta}% / ${totalArt} articles / ${follower} followers / `;

  return {
    totalPV, totalLike, totalArt, follower,
    pvDiff: totalPV - prevPV, likeDiff: totalLike - prevLike,
    artDiff: totalArt - prevArt, followerDiff: follower - prevFollower,
    pvGrowth, likeGrowth, eta,
    top5PV, top5Like, top5Eta, worst3,
    topFans, catCounts, catEtaAvg,
    growthChart, tickerText,
    rising, cont, slow, stop,
    journeyCount, daysSinceStart,
    firstArticleDate, lastArticleDate,
    milestones,
    rewriteCandidates,
    mostWrittenCat, leastWrittenCats, highEtaCat,
    updatedAt: latest.date,
  };
}

function buildGrowthChart(data) {
  const canvas = document.getElementById('chart-growth');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.parentElement.clientWidth - 32;
  const H = 180;
  canvas.width = W * 2; canvas.height = H * 2;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.scale(2, 2);

  const pvs = data.map(d => d.pv);
  const maxPV = Math.max(...pvs);
  const minPV = Math.min(...pvs);
  const range = maxPV - minPV || 1;
  const pad = {t: 10, b: 30, l: 40, r: 10};
  const cw = W - pad.l - pad.r;
  const ch = H - pad.t - pad.b;

  ctx.strokeStyle = '#e8e0f0'; ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + ch * i / 4;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y); ctx.stroke();
    ctx.fillStyle = '#999'; ctx.font = '10px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(Math.round((maxPV - range * i / 4) / 1000) + 'K', pad.l - 4, y + 4);
  }
  ctx.fillStyle = '#999'; ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
  const labelStep = Math.max(1, Math.floor(data.length / 6));
  data.forEach((d, i) => {
    if (i % labelStep === 0 || i === data.length - 1) {
      ctx.fillText(d.d, pad.l + cw * i / (data.length - 1), H - 8);
    }
  });

  ctx.beginPath();
  data.forEach((d, i) => {
    const x = pad.l + cw * i / (data.length - 1);
    const y = pad.t + ch * (1 - (d.pv - minPV) / range);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.lineTo(pad.l + cw, pad.t + ch); ctx.lineTo(pad.l, pad.t + ch); ctx.closePath();
  const grad = ctx.createLinearGradient(0, pad.t, 0, pad.t + ch);
  grad.addColorStop(0, 'rgba(108,92,231,0.2)'); grad.addColorStop(1, 'rgba(108,92,231,0.02)');
  ctx.fillStyle = grad; ctx.fill();

  ctx.beginPath();
  data.forEach((d, i) => {
    const x = pad.l + cw * i / (data.length - 1);
    const y = pad.t + ch * (1 - (d.pv - minPV) / range);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.strokeStyle = ACCENT; ctx.lineWidth = 2.5; ctx.lineJoin = 'round'; ctx.stroke();

  const lx = pad.l + cw;
  const ly = pad.t + ch * (1 - (data[data.length-1].pv - minPV) / range);
  ctx.beginPath(); ctx.arc(lx, ly, 4, 0, Math.PI * 2); ctx.fillStyle = ACCENT; ctx.fill();
}

function buildFollowerChart(data) {
  const canvas = document.getElementById('chart-follower');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.parentElement.clientWidth - 32;
  const H = 180;
  canvas.width = W * 2; canvas.height = H * 2;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.scale(2, 2);

  const vals = data.map(d => d.follower);
  const maxV = Math.max(...vals);
  const minV = Math.min(...vals);
  const range = maxV - minV || 1;
  const pad = {t: 10, b: 30, l: 40, r: 10};
  const cw = W - pad.l - pad.r;
  const ch = H - pad.t - pad.b;

  ctx.strokeStyle = '#e8e0f0'; ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + ch * i / 4;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y); ctx.stroke();
    ctx.fillStyle = '#999'; ctx.font = '10px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(Math.round(maxV - range * i / 4), pad.l - 4, y + 4);
  }
  ctx.fillStyle = '#999'; ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
  const labelStep = Math.max(1, Math.floor(data.length / 6));
  data.forEach((d, i) => {
    if (i % labelStep === 0 || i === data.length - 1) {
      ctx.fillText(d.d, pad.l + cw * i / (data.length - 1), H - 8);
    }
  });

  ctx.beginPath();
  data.forEach((d, i) => {
    const x = pad.l + cw * i / (data.length - 1);
    const y = pad.t + ch * (1 - (d.follower - minV) / range);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.lineTo(pad.l + cw, pad.t + ch); ctx.lineTo(pad.l, pad.t + ch); ctx.closePath();
  const grad = ctx.createLinearGradient(0, pad.t, 0, pad.t + ch);
  grad.addColorStop(0, 'rgba(253,121,168,0.25)'); grad.addColorStop(1, 'rgba(253,121,168,0.02)');
  ctx.fillStyle = grad; ctx.fill();

  ctx.beginPath();
  data.forEach((d, i) => {
    const x = pad.l + cw * i / (data.length - 1);
    const y = pad.t + ch * (1 - (d.follower - minV) / range);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.strokeStyle = PINK; ctx.lineWidth = 2.5; ctx.lineJoin = 'round'; ctx.stroke();

  const lx = pad.l + cw;
  const ly = pad.t + ch * (1 - (data[data.length-1].follower - minV) / range);
  ctx.beginPath(); ctx.arc(lx, ly, 4, 0, Math.PI * 2); ctx.fillStyle = PINK; ctx.fill();
}
